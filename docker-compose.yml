version: "3.8"

services:
  bt-gateway:
    build: .
    container_name: bt-gateway
    restart: unless-stopped

    # Bluetooth requires privileged access to the host hardware
    privileged: true
    network_mode: host

    volumes:
      # Persistent configuration
      - bt-gateway-data:/data
      # Host D-Bus system bus (required for BlueZ communication)
      - /var/run/dbus:/var/run/dbus
      # Host /dev — so dynamically-created /dev/rfcomm<N> nodes from
      # `rfcomm bind` are visible inside the container.  Without this
      # the kernel creates the TTY on the host's devtmpfs but the
      # container's /dev tmpfs stays empty and os.open() fails with
      # ENOENT.
      - /dev:/dev

    environment:
      - CONFIG_PATH=/data/config.json
      - LOG_LEVEL=INFO

volumes:
  bt-gateway-data:
